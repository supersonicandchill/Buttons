
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daily Game Tasks</title>

<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #1a1c22;
        color: white;
        margin: 0;
        padding: 0;
    }

    /* Header */
    h2 {
        margin: 20px 15px 10px;
        color: #dde1ed;
    }

    /* XP + Streak */
    #xpBarContainer {
        margin: 15px;
        height: 22px;
        background: #3a3d47;
        border-radius: 12px;
        overflow: hidden;
    }
    #xpBar { 
        height: 100%; 
        width: 0%; 
        background: linear-gradient(90deg,#4cd964,#6effb7); 
        transition: width .3s; 
    }

    #xpLabel, #streakLabel {
        text-align: center;
        font-size: .95rem;
    }
    #streakLabel { color: #ffcc66; margin-top: 6px; }

    /* Layout */
    #taskContainer {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 15px;
    }

    .taskRow {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .taskButton {
        flex: 1;
        padding: 16px;
        text-align: center;
        border-radius: 12px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: .2s;
    }

    .pending {
        background: #ff4f4f;
        box-shadow: 0 4px 10px rgba(255,70,70,.25);
    }
    .done {
        background: #4cd964;
        box-shadow: 0 4px 10px rgba(90,255,150,.25);
    }

    .arrowBtn {
        background: #2a2d36;
        border: none;
        color: white;
        font-size: 1.4rem;
        width: 40px;
        height: 40px;
        border-radius: 8px;
        cursor: pointer;
    }

    #addBar {
        display: flex;
        padding: 15px;
        gap: 10px;
    }
    input {
        flex: 1;
        border-radius: 10px;
        padding: 14px;
        border: none;
        font-size: 1rem;
    }
    button {
        padding: 14px;
        border-radius: 10px;
        border: none;
        background: #007aff;
        color: white;
        font-weight: 600;
        cursor: pointer;
        font-size: 1rem;
    }

    /* Pomodoro */
    #pomodoroTabBtn {
        margin: 20px auto;
        display: block;
        background: #835bff;
        padding: 12px 20px;
        border-radius: 10px;
        font-size: 1rem;
    }

    #pomodoroPage { display: none; text-align: center; padding: 20px; }
    #timer { font-size: 3.2rem; margin: 30px 0; }
    #pomodoroBtns button { width: 100px; margin: 6px; }
</style>
</head>

<body>

<h2>Daily Tasks</h2>

<!-- XP + Streak -->
<div id="xpBarContainer"><div id="xpBar"></div></div>
<div id="xpLabel">XP: 0 / 100</div>
<div id="streakLabel">🔥 Streak: 0 days</div>

<!-- Tasks -->
<div id="taskContainer"></div>

<!-- Add Task -->
<div id="addBar">
    <input id="newTaskInput" placeholder="Add new task…">
    <button onclick="addTask()">Add</button>
</div>

<!-- Pomodoro Button -->
<button id="pomodoroTabBtn" onclick="openPomodoro()">Pomodoro Timer</button>

<!-- Pomodoro Page -->
<div id="pomodoroPage">
    <h2>Pomodoro Timer</h2>
    <div id="timer">25:00</div>
    <div id="pomodoroBtns">
        <button onclick="startPomodoro()">Start</button>
        <button onclick="pausePomodoro()">Pause</button>
        <button onclick="resetPomodoro()">Reset</button>
        <button onclick="closePomodoro()">Back</button>
    </div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("gameTasks_v2") || `{
    "tasks": [],
    "xp": 0,
    "streak": 0,
    "lastCompletionDate": ""
}`);

function save() {
    localStorage.setItem("gameTasks_v2", JSON.stringify(data));
}

/* RENDER */
function render() {
    updateXP();
    updateStreakUI();

    const container = document.getElementById("taskContainer");
    container.innerHTML = "";

    data.tasks.forEach((task, i) => {
        const row = document.createElement("div");
        row.className = "taskRow";

        if (!task.done) {
            let upBtn = document.createElement("button");
            upBtn.className = "arrowBtn";
            upBtn.textContent = "↑";
            upBtn.onclick = () => moveUp(i);
            row.appendChild(upBtn);

            let downBtn = document.createElement("button");
            downBtn.className = "arrowBtn";
            downBtn.textContent = "↓";
            downBtn.onclick = () => moveDown(i);
            row.appendChild(downBtn);
        } else {
            let spacer1 = document.createElement("div"); spacer1.style.width = "40px";
            let spacer2 = document.createElement("div"); spacer2.style.width = "40px";
            row.appendChild(spacer1);
            row.appendChild(spacer2);
        }

        const btn = document.createElement("div");
        btn.className = "taskButton " + (task.done ? "done" : "pending");
        btn.textContent = task.done ? "✔ " + task.text : task.text;
        btn.onclick = () => toggleTask(i);
        row.appendChild(btn);

        container.appendChild(row);
    });
}

/* LOGIC */
function addTask() {
    const input = document.getElementById("newTaskInput");
    const text = input.value.trim();
    if (!text) return;

    data.tasks.push({ text, done: false });
    input.value = "";
    save();
    render();
}

function toggleTask(i) {
    const task = data.tasks[i];
    let wasDone = task.done;
    task.done = !task.done;

    if (!wasDone && task.done) {
        data.xp += 10;

        let today = new Date().toLocaleDateString("en-CA");
        let yesterday = new Date(Date.now() - 86400000).toLocaleDateString("en-CA");

        if (data.lastCompletionDate === "") data.streak = 1;
        else if (data.lastCompletionDate === yesterday) data.streak++;
        else if (data.lastCompletionDate !== today) data.streak = 1;

        data.lastCompletionDate = today;

        const doneTask = data.tasks.splice(i, 1)[0];
        data.tasks.push(doneTask);
    }

    save();
    render();
}

/* MOVE UP/DOWN */
function moveUp(i) {
    if (i === 0) return;
    let temp = data.tasks[i];
    data.tasks[i] = data.tasks[i - 1];
    data.tasks[i - 1] = temp;
    save();
    render();
}

function moveDown(i) {
    if (i === data.tasks.length - 1) return;
    let temp = data.tasks[i];
    data.tasks[i] = data.tasks[i + 1];
    data.tasks[i + 1] = temp;
    save();
    render();
}

/* XP */
function updateXP() {
    const xp = data.xp % 100;
    document.getElementById("xpBar").style.width = xp + "%";
    document.getElementById("xpLabel").textContent = `XP: ${xp} / 100`;
}

/* STREAK */
function updateStreakUI() {
    document.getElementById("streakLabel").textContent =
        `🔥 Streak: ${data.streak} days`;
}

/* POMODORO */
let timer;
let timeLeft = 1500;

function openPomodoro() {
    document.getElementById("pomodoroPage").style.display = "block";
}
function closePomodoro() {
    document.getElementById("pomodoroPage").style.display = "none";
}

function updateTimerDisplay() {
    let m = Math.floor(timeLeft / 60);
    let s = timeLeft % 60;
    document.getElementById("timer").textContent =
        `${m}:${s.toString().padStart(2, "0")}`;
}

function startPomodoro() {
    if (timer) return;
    timer = setInterval(() => {
        if (timeLeft > 0) {
            timeLeft--;
            updateTimerDisplay();
        } else {
            clearInterval(timer);
            timer = null;
        }
    }, 1000);
}

function pausePomodoro() {
    clearInterval(timer);
    timer = null;
}

function resetPomodoro() {
    pausePomodoro();
    timeLeft = 1500;
    updateTimerDisplay();
}

render();
</script>

</body>
</html>
