
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Buttons</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
    :root {
        --bg: #0d0f14;
        --panel: #161a24;
        --border: #2a2f42;
        --neon-blue: #00d4ff;
        --neon-green: #00ff88;
        --neon-red: #ff3355;
        --neon-purple: #bf5fff;
        --neon-yellow: #ffe600;
        --text: #e8eaf0;
        --text-dim: #6b7280;
        --tap-target: 54px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body { height: 100%; overscroll-behavior: none; }

    body {
        font-family: 'Orbitron', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
        padding-bottom: env(safe-area-inset-bottom, 20px);
    }

    body::before {
        content: '';
        position: fixed; inset: 0;
        background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
        pointer-events: none;
        z-index: 999;
    }

    /* HEADER */
    #header {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 22px 20px 12px;
    }

    #header h1 {
        font-family: 'Press Start 2P', monospace;
        font-size: clamp(1.3rem, 7vw, 2rem);
        color: var(--neon-blue);
        text-shadow: 0 0 10px var(--neon-blue), 0 0 30px rgba(0,212,255,0.5), 0 0 60px rgba(0,212,255,0.2);
        letter-spacing: 4px;
        animation: flicker 4s infinite;
    }

    @keyframes flicker {
        0%,95%,100% { opacity:1; }
        96% { opacity:.7; }
        97% { opacity:1; }
        98% { opacity:.85; }
    }

    .header-line {
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
        margin: 0 16px 16px;
        box-shadow: 0 0 8px var(--neon-blue);
    }

    /* TASKS */
    #taskContainer {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 0 12px;
    }

    .taskRow {
        display: flex;
        align-items: stretch;
        gap: 7px;
    }

    .taskButton {
        flex: 1;
        padding: 0 10px;
        text-align: center;
        border-radius: 8px;
        font-family: 'Orbitron', sans-serif;
        font-size: clamp(0.65rem, 3.5vw, 0.9rem);
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.1s, box-shadow 0.1s;
        border: none;
        position: relative;
        overflow: hidden;
        letter-spacing: 0.5px;
        min-height: var(--tap-target);
        display: flex;
        align-items: center;
        justify-content: center;
        word-break: break-word;
        line-height: 1.3;
    }

    .taskButton::before {
        content: '';
        position: absolute; inset: 0;
        background: linear-gradient(180deg, rgba(255,255,255,0.13) 0%, transparent 55%);
        pointer-events: none;
    }

    .pending {
        background: linear-gradient(180deg, #c0192a 0%, #8b0000 100%);
        box-shadow: 0 5px 0 #5a0000, 0 7px 18px rgba(255,30,60,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
        color: #fff;
        text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    }

    .pending:active {
        box-shadow: 0 1px 0 #5a0000, inset 0 2px 4px rgba(0,0,0,0.3);
        transform: translateY(4px);
    }

    .done {
        background: linear-gradient(180deg, #00b865 0%, #005e33 100%);
        box-shadow: 0 5px 0 #003d21, 0 7px 18px rgba(0,255,136,0.2), inset 0 1px 0 rgba(255,255,255,0.15);
        color: #fff;
        text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    }

    .arrowBtn {
        background: linear-gradient(180deg, #2a3048 0%, #1a1f30 100%);
        border: 1px solid var(--border);
        color: var(--neon-blue);
        font-size: 0.9rem;
        width: 40px;
        flex-shrink: 0;
        min-height: var(--tap-target);
        border-radius: 8px;
        cursor: pointer;
        transition: transform 0.1s, box-shadow 0.1s;
        box-shadow: 0 4px 0 #0a0d15;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .arrowBtn:active { transform: translateY(3px); box-shadow: 0 1px 0 #0a0d15; }

    .deleteBtn {
        background: linear-gradient(180deg, #2a1a28 0%, #1a0f18 100%);
        border: 1px solid #3d1a35;
        color: var(--neon-purple);
        font-size: 1rem;
        width: 40px;
        flex-shrink: 0;
        min-height: var(--tap-target);
        border-radius: 8px;
        cursor: pointer;
        transition: transform 0.1s, box-shadow 0.1s;
        box-shadow: 0 4px 0 #0a0008;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .deleteBtn:active { transform: translateY(3px); box-shadow: 0 1px 0 #0a0008; }

    /* ADD BAR */
    #addBar {
        display: flex;
        padding: 14px 12px;
        gap: 10px;
    }

    #newTaskInput {
        flex: 1;
        min-width: 0;
        border-radius: 8px;
        padding: 14px;
        border: 1px solid var(--border);
        background: var(--panel);
        font-size: 1rem;
        font-family: 'Orbitron', sans-serif;
        color: var(--text);
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
        -webkit-appearance: none;
    }

    #newTaskInput:focus { border-color: var(--neon-blue); box-shadow: 0 0 12px rgba(0,212,255,0.25); }
    #newTaskInput::placeholder { color: var(--text-dim); font-size: 0.8rem; }

    #addBtn {
        flex-shrink: 0;
        padding: 14px 16px;
        border-radius: 8px;
        border: none;
        background: linear-gradient(180deg, #0099cc 0%, #005f80 100%);
        color: white;
        font-weight: 700;
        font-family: 'Orbitron', sans-serif;
        cursor: pointer;
        font-size: 0.8rem;
        letter-spacing: 0.5px;
        box-shadow: 0 5px 0 #003347, 0 6px 15px rgba(0,212,255,0.25);
        transition: transform 0.1s, box-shadow 0.1s;
        white-space: nowrap;
    }

    #addBtn:active { transform: translateY(4px); box-shadow: 0 1px 0 #003347; }

    /* POMODORO TAB */
    #pomodoroTabBtn {
        display: block;
        margin: 0 12px 28px;
        width: calc(100% - 24px);
        background: linear-gradient(180deg, #7b35cc 0%, #4a1a80 100%);
        color: white;
        font-family: 'Orbitron', sans-serif;
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 1px;
        padding: 18px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        box-shadow: 0 6px 0 #2a0a50, 0 8px 20px rgba(120,50,220,0.3);
        transition: transform 0.1s, box-shadow 0.1s;
    }

    #pomodoroTabBtn:active { transform: translateY(5px); box-shadow: 0 1px 0 #2a0a50; }

    /* POMODORO PAGE */
    #pomodoroPage {
        display: none;
        position: fixed; inset: 0;
        background: var(--bg);
        z-index: 100;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 30px 20px;
        padding-bottom: max(30px, env(safe-area-inset-bottom));
    }

    #pomodoroPage.active { display: flex; }

    #pomodoroPage h2 {
        font-family: 'Press Start 2P', monospace;
        font-size: clamp(1rem, 5vw, 1.5rem);
        color: var(--neon-purple);
        text-shadow: 0 0 15px var(--neon-purple), 0 0 40px rgba(191,95,255,0.4);
        margin-bottom: 12px;
        letter-spacing: 2px;
    }

    #tickDot {
        width: 14px; height: 14px;
        border-radius: 50%;
        background: var(--neon-yellow);
        box-shadow: 0 0 12px var(--neon-yellow);
        margin-bottom: 12px;
        transition: opacity 0.15s;
    }

    /* Sound toggle pill */
    #soundToggle {
        margin-bottom: 20px;
        background: var(--panel);
        border: 1px solid var(--border);
        color: var(--text-dim);
        font-family: 'Orbitron', sans-serif;
        font-size: 0.7rem;
        padding: 10px 20px;
        border-radius: 30px;
        cursor: pointer;
        letter-spacing: 1px;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 44px;
    }

    #soundToggle.sound-on {
        border-color: var(--neon-green);
        color: var(--neon-green);
        box-shadow: 0 0 12px rgba(0,255,136,0.25);
    }

    #soundToggle .sicon { font-size: 1.1rem; }

    #timer {
        font-family: 'Press Start 2P', monospace;
        font-size: clamp(3rem, 17vw, 5.5rem);
        color: var(--neon-yellow);
        text-shadow: 0 0 20px var(--neon-yellow), 0 0 60px rgba(255,230,0,0.35);
        margin: 24px 0;
        letter-spacing: 4px;
        transition: color 0.3s, text-shadow 0.3s;
    }

    #timer.urgent {
        color: var(--neon-red);
        text-shadow: 0 0 20px var(--neon-red), 0 0 60px rgba(255,30,60,0.5);
        animation: pulse 0.5s infinite alternate;
    }

    @keyframes pulse { from { opacity:1; } to { opacity:.65; } }

    #pomodoroBtns {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        width: 100%;
        max-width: 320px;
    }

    #pomodoroBtns button {
        padding: 18px 10px;
        border-radius: 8px;
        border: none;
        font-family: 'Orbitron', sans-serif;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.5px;
        cursor: pointer;
        transition: transform 0.1s, box-shadow 0.1s;
        min-height: 56px;
    }

    #pomodoroBtns button:active { transform: translateY(4px) !important; box-shadow: 0 1px 0 #000 !important; }

    #startBtn { background: linear-gradient(180deg,#00b865,#005e33); color:#fff; box-shadow:0 5px 0 #003d21; }
    #pauseBtn { background: linear-gradient(180deg,#cc8800,#7a5000); color:#fff; box-shadow:0 5px 0 #3d2800; }
    #resetBtn { background: linear-gradient(180deg,#2a3048,#1a1f30); color:var(--neon-blue); border:1px solid var(--border); box-shadow:0 5px 0 #0a0d15; }
    #backBtn  { background: linear-gradient(180deg,#7b35cc,#4a1a80); color:#fff; box-shadow:0 5px 0 #2a0a50; }

    /* Flash overlay */
    #flashOverlay {
        position: fixed; inset: 0;
        background: rgba(0,255,136,0.15);
        pointer-events: none;
        opacity: 0; z-index: 200;
        transition: opacity 0.3s;
    }
    #flashOverlay.flash { opacity: 1; }

    /* Corners */
    .corner { position:fixed; width:28px; height:28px; pointer-events:none; z-index:50; opacity:.35; }
    .corner-tl { top:8px;    left:8px;  border-top:2px solid var(--neon-blue); border-left:2px solid var(--neon-blue); }
    .corner-tr { top:8px;    right:8px; border-top:2px solid var(--neon-blue); border-right:2px solid var(--neon-blue); }
    .corner-bl { bottom:8px; left:8px;  border-bottom:2px solid var(--neon-blue); border-left:2px solid var(--neon-blue); }
    .corner-br { bottom:8px; right:8px; border-bottom:2px solid var(--neon-blue); border-right:2px solid var(--neon-blue); }
</style>
</head>
<body>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>
<div id="flashOverlay"></div>

<div id="header"><h1>BUTTONS</h1></div>
<div class="header-line"></div>

<div id="taskContainer"></div>

<div id="addBar">
    <input id="newTaskInput" placeholder="New button…" onkeydown="if(event.key==='Enter')addTask()">
    <button id="addBtn" onclick="addTask()">+ ADD</button>
</div>

<button id="pomodoroTabBtn" onclick="openPomodoro()">⏱ POMODORO TIMER</button>

<div id="pomodoroPage">
    <h2>POMODORO</h2>
    <div id="tickDot"></div>
    <button id="soundToggle" onclick="toggleSound()">
        <span class="sicon">🔇</span>
        <span id="soundLabel">SOUND OFF</span>
    </button>
    <div id="timer">25:00</div>
    <div id="pomodoroBtns">
        <button id="startBtn" onclick="startPomodoro()">▶ START</button>
        <button id="pauseBtn" onclick="pausePomodoro()">⏸ PAUSE</button>
        <button id="resetBtn" onclick="resetPomodoro()">↺ RESET</button>
        <button id="backBtn"  onclick="closePomodoro()">← BACK</button>
    </div>
</div>

<script>
/* DATA */
let data = JSON.parse(localStorage.getItem("buttons_v1") || '{"tasks":[]}');
function save() { localStorage.setItem("buttons_v1", JSON.stringify(data)); }

/* AUDIO */
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
let soundOn = false;

function getAudioCtx() {
    if (!audioCtx) audioCtx = new AudioCtx();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
}

function toggleSound() {
    soundOn = !soundOn;
    const btn   = document.getElementById("soundToggle");
    const icon  = btn.querySelector(".sicon");
    const label = document.getElementById("soundLabel");
    if (soundOn) {
        btn.classList.add("sound-on");
        icon.textContent  = "🔊";
        label.textContent = "SOUND ON";
        getAudioCtx(); // must unlock on user gesture
    } else {
        btn.classList.remove("sound-on");
        icon.textContent  = "🔇";
        label.textContent = "SOUND OFF";
    }
}

function playTick() {
    if (!soundOn) return;
    try {
        const ctx = getAudioCtx(), t = ctx.currentTime;
        const osc = ctx.createOscillator(), g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.type = 'square'; osc.frequency.setValueAtTime(880, t);
        g.gain.setValueAtTime(0.04, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
        osc.start(t); osc.stop(t + 0.04);
    } catch(e) {}
}

function playTock() {
    if (!soundOn) return;
    try {
        const ctx = getAudioCtx(), t = ctx.currentTime;
        const osc = ctx.createOscillator(), g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.type = 'square'; osc.frequency.setValueAtTime(660, t);
        g.gain.setValueAtTime(0.04, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
        osc.start(t); osc.stop(t + 0.04);
    } catch(e) {}
}

function playDing() {
    if (!soundOn) return;
    try {
        const ctx = getAudioCtx(), t = ctx.currentTime;
        [523, 659, 784, 1047].forEach((freq, i) => {
            const osc = ctx.createOscillator(), g = ctx.createGain();
            osc.connect(g); g.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, t + i * 0.12);
            g.gain.setValueAtTime(0, t + i * 0.12);
            g.gain.linearRampToValueAtTime(0.3, t + i * 0.12 + 0.02);
            g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + 0.4);
            osc.start(t + i * 0.12); osc.stop(t + i * 0.12 + 0.5);
        });
    } catch(e) {}
}

/* RENDER */
function render() {
    const container = document.getElementById("taskContainer");
    container.innerHTML = "";

    data.tasks.forEach((task, i) => {
        const row = document.createElement("div");
        row.className = "taskRow";

        if (!task.done) {
            ["▲","▼"].forEach((sym, dir) => {
                const ab = document.createElement("button");
                ab.className = "arrowBtn";
                ab.innerHTML = sym;
                ab.onclick = () => dir === 0 ? moveUp(i) : moveDown(i);
                row.appendChild(ab);
            });
        } else {
            [0,1].forEach(() => {
                const sp = document.createElement("div");
                sp.style.cssText = "width:40px;flex-shrink:0;";
                row.appendChild(sp);
            });
        }

        const btn = document.createElement("button");
        btn.className = "taskButton " + (task.done ? "done" : "pending");
        btn.textContent = task.done ? "✔ " + task.text : task.text;
        btn.onclick = () => toggleTask(i);
        row.appendChild(btn);

        const del = document.createElement("button");
        del.className = "deleteBtn";
        del.innerHTML = "✕";
        del.dataset.armed = "false";

        function disarmDel() {
            clearTimeout(del._armTimer);
            del._armTimer = null;
            del.dataset.armed = "false";
            del.innerHTML = "✕";
            del.style.borderColor = "";
            del.style.color = "";
            del.style.boxShadow = "";
        }

        del.onclick = (e) => {
            e.stopPropagation();
            if (del.dataset.armed === "true") {
                clearTimeout(del._armTimer);
                removeTask(i);
            } else {
                del.dataset.armed = "true";
                del.innerHTML = "✓";
                del.style.borderColor = "var(--neon-red)";
                del.style.color = "var(--neon-red)";
                del.style.boxShadow = "0 4px 0 #0a0008, 0 0 12px rgba(255,50,80,0.5)";
                clearTimeout(del._armTimer);
                del._armTimer = setTimeout(disarmDel, 3000);
            }
        };
        row.appendChild(del);

        container.appendChild(row);
    });
}

/* TASK LOGIC */
function addTask() {
    const input = document.getElementById("newTaskInput");
    const text  = input.value.trim().toUpperCase();
    if (!text) return;
    data.tasks.push({ text, done: false });
    input.value = "";
    save(); render();
}

function toggleTask(i) {
    const task = data.tasks[i];
    const wasDone = task.done;
    task.done = !task.done;
    if (!wasDone && task.done) {
        const doneTask = data.tasks.splice(i, 1)[0];
        data.tasks.push(doneTask);
        const ov = document.getElementById("flashOverlay");
        ov.classList.add("flash");
        setTimeout(() => ov.classList.remove("flash"), 300);
    }
    save(); render();
}

function removeTask(i) { data.tasks.splice(i, 1); save(); render(); }
function moveUp(i)   { if (i === 0) return; [data.tasks[i],data.tasks[i-1]] = [data.tasks[i-1],data.tasks[i]]; save(); render(); }
function moveDown(i) { if (i === data.tasks.length-1) return; [data.tasks[i],data.tasks[i+1]] = [data.tasks[i+1],data.tasks[i]]; save(); render(); }

/* ── POMODORO — wall-clock timer survives screen-off ── */
const DURATION = 1500; // 25 min
let timeLeft       = DURATION;
let isRunning      = false;
let startEpoch     = null;  // Date.now() when current run started
let elapsedAtPause = 0;     // seconds accumulated before current run
let tickToggle     = false;
let tickInterval   = null;

function openPomodoro()  { document.getElementById("pomodoroPage").classList.add("active"); }
function closePomodoro() { document.getElementById("pomodoroPage").classList.remove("active"); }

function updateTimerDisplay() {
    const m  = Math.floor(timeLeft / 60);
    const s  = timeLeft % 60;
    const el = document.getElementById("timer");
    el.textContent = `${m}:${s.toString().padStart(2,"0")}`;
    el.className   = (timeLeft <= 60 && isRunning) ? "urgent" : "";
}

function computeTimeLeft() {
    if (!isRunning) return timeLeft;
    const totalElapsed = elapsedAtPause + Math.floor((Date.now() - startEpoch) / 1000);
    return Math.max(0, DURATION - totalElapsed);
}

function startTick() {
    if (tickInterval) return;
    tickInterval = setInterval(() => {
        if (!isRunning) return;
        timeLeft = computeTimeLeft();
        updateTimerDisplay();

        tickToggle = !tickToggle;
        if (tickToggle) playTick(); else playTock();
        document.getElementById("tickDot").style.opacity = tickToggle ? "1" : "0.2";

        if (timeLeft <= 0) {
            clearInterval(tickInterval); tickInterval = null;
            isRunning = false;
            playDing();
            document.getElementById("tickDot").style.opacity = "0";
            document.getElementById("timer").className = "";
        }
    }, 1000);
}

function startPomodoro() {
    if (isRunning) return;
    if (soundOn) getAudioCtx();
    isRunning  = true;
    startEpoch = Date.now();
    startTick();
}

function pausePomodoro() {
    if (!isRunning) return;
    elapsedAtPause += Math.floor((Date.now() - startEpoch) / 1000);
    isRunning = false;
    clearInterval(tickInterval); tickInterval = null;
    document.getElementById("tickDot").style.opacity = "0.2";
    document.getElementById("timer").className = "";
}

function resetPomodoro() {
    // Directly stop everything regardless of isRunning state
    clearInterval(tickInterval); tickInterval = null;
    isRunning      = false;
    elapsedAtPause = 0;
    startEpoch     = null;
    timeLeft       = DURATION;
    updateTimerDisplay();
    document.getElementById("tickDot").style.opacity = "1";
    document.getElementById("timer").className = "";
}

/* Screen-off / tab-switch recovery */
document.addEventListener("visibilitychange", () => {
    if (!document.hidden && isRunning) {
        timeLeft = computeTimeLeft();
        updateTimerDisplay();
        if (timeLeft <= 0) {
            clearInterval(tickInterval); tickInterval = null;
            isRunning = false;
            playDing();
            document.getElementById("tickDot").style.opacity = "0";
        }
    }
});

/* Init */
render();
updateTimerDisplay();
</script>
</body>
</html>
