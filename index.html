<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Daily Game Tasks</title>

<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #1a1c22;
        margin: 0;
        padding: 0;
        color: white;
    }

    #tabs { 
        display: flex;
        background: #2a2d36;
        padding: 10px;
    }

    .tab {
        flex: 1;
        text-align: center;
        padding: 14px 0;
        cursor: pointer;
        font-weight: 600;
        border-bottom: 3px solid transparent;
        transition: .2s;
    }
    .tab.active { 
        color: #4cd964; 
        border-color: #4cd964;
    }

    #xpBarContainer {
        margin: 15px;
        height: 22px;
        background: #3a3d47;
        border-radius: 12px;
        overflow: hidden;
    }
    #xpBar { height: 100%; width: 0%; background: linear-gradient(90deg,#4cd964,#6effb7); transition: width .3s; }

    #xpLabel { text-align: center; margin-top: -4px; font-size: .9rem; }
    #streakLabel { text-align: center; margin-top: 6px; font-size: 1rem; color: #ffcc66; }

    h2 {
        margin-left: 15px;
        margin-top: 20px;
        color: #dde1ed;
    }

    #taskContainer {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 12px;
        padding: 15px;
    }

    .task {
        padding: 18px;
        text-align: center;
        border-radius: 15px;
        font-size: 1.05rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform .1s, background .2s;
        user-select: none;
    }
    .task:active { transform: scale(.95); }

    .pending { background:#ff4f4f; box-shadow:0 4px 10px rgba(255,70,70,.25);}
    .done { background:#4cd964; box-shadow:0 4px 10px rgba(90,255,150,.25); }

    #addBar { display:flex; padding:15px; gap:10px; }
    input { flex:1; border-radius:10px; padding:14px; border:none; font-size:1rem; background:#e3e3e8; }
    button { padding:14px; border-radius:10px; border:none; background:#007aff; color:white; font-weight:600; cursor:pointer; font-size:1rem;}

    #pomodoroPage { display:none; text-align:center; padding:20px; }
    #timer { font-size:3.8rem; margin:40px 0; font-weight:600; }
    #pomodoroBtns button { width:100px; margin:6px; }
</style>
</head>

<body>

<div id="tabs">
    <div class="tab active" onclick="switchTab('morning')">Morning</div>
    <div class="tab" onclick="switchTab('afternoon')">Afternoon</div>
    <div class="tab" onclick="switchTab('night')">Night</div>
    <div class="tab" onclick="switchTab('pomodoro')">Pomodoro</div>
</div>

<div id="xpBarContainer"><div id="xpBar"></div></div>
<div id="xpLabel">XP: 0 / 100</div>
<div id="streakLabel">🔥 Streak: 0 days</div>

<h2 id="sectionTitle">Morning Tasks</h2>

<div id="taskContainer"></div>

<div id="addBar">
    <input id="newTaskInput" placeholder="Add new task…" />
    <button onclick="addTask()">Add</button>
</div>

<div id="pomodoroPage">
    <h2>Pomodoro Timer</h2>
    <div id="timer">25:00</div>
    <div id="pomodoroBtns">
        <button onclick="startPomodoro()">Start</button>
        <button onclick="pausePomodoro()">Pause</button>
        <button onclick="resetPomodoro()">Reset</button>
    </div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("gameTasks") || `{
    "morning": [],
    "afternoon": [],
    "night": [],
    "xp": 0,
    "streak": 0,
    "lastCompletionDate": ""
}`);

let currentTab = "morning";

function save() {
    localStorage.setItem("gameTasks", JSON.stringify(data));
}

function isNewDay() {
    let today = new Date().toLocaleDateString("en-CA");
    return today !== data.lastCompletionDate;
}

function render() {
    updateStreakUI();

    if (currentTab === "pomodoro") {
        document.getElementById("taskContainer").style.display = "none";
        document.getElementById("addBar").style.display = "none";
        document.getElementById("sectionTitle").style.display = "none";
        document.getElementById("pomodoroPage").style.display = "block";
        return;
    }

    document.getElementById("pomodoroPage").style.display = "none";
    document.getElementById("taskContainer").style.display = "grid";
    document.getElementById("addBar").style.display = "flex";
    document.getElementById("sectionTitle").style.display = "block";

    document.getElementById("sectionTitle").textContent =
        currentTab.charAt(0).toUpperCase() + currentTab.slice(1) + " Tasks";

    const container = document.getElementById("taskContainer");
    container.innerHTML = "";

    data[currentTab].forEach((task, i) => {
        const div = document.createElement("div");
        div.className = "task " + (task.done ? "done" : "pending");
        div.textContent = task.done ? "✔ " + task.text : task.text;

        div.onclick = () => toggleTask(i);
        div.oncontextmenu = (e) => {
            e.preventDefault();
            if (confirm("Delete this task?")) {
                data[currentTab].splice(i, 1);
                save();
                render();
            }
        };

        container.appendChild(div);
    });

    updateXP();
}

function addTask() {
    const input = document.getElementById("newTaskInput");
    const text = input.value.trim();
    if (!text) return;

    data[currentTab].push({ text, done: false });
    input.value = "";
    save();
    render();
}

function toggleTask(i) {
    const task = data[currentTab][i];
    let wasDone = task.done;
    task.done = !task.done;

    if (!wasDone && task.done) {
        data.xp += 10;

        let today = new Date().toLocaleDateString("en-CA");

        if (data.lastCompletionDate === "") {
            data.streak = 1;
        } else if (isNewDay()) {
            let yesterday = new Date(Date.now() - 86400000).toLocaleDateString("en-CA");
            if (data.lastCompletionDate === yesterday) data.streak++;
            else data.streak = 1;
        }

        data.lastCompletionDate = today;
    }

    save();
    render();
}

function updateXP() {
    const xp = data.xp % 100;
    document.getElementById("xpBar").style.width = xp + "%";
    document.getElementById("xpLabel").textContent = `XP: ${xp} / 100`;
}

function updateStreakUI() {
    document.getElementById("streakLabel").textContent =
        `🔥 Streak: ${data.streak} days`;
}

function switchTab(tab) {
    currentTab = tab;

    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelector(`.tab:nth-child(${{
        morning: 1, afternoon: 2, night: 3, pomodoro: 4
    }[tab]})`).classList.add("active");

    render();
}

let timer;
let timeLeft = 1500;

function updateTimerDisplay() {
    let m = Math.floor(timeLeft / 60);
    let s = timeLeft % 60;
    document.getElementById("timer").textContent =
        `${m}:${s.toString().padStart(2, "0")}`;
}

function startPomodoro() {
    if (timer) return;
    timer = setInterval(() => {
        if (timeLeft > 0) {
            timeLeft--;
            updateTimerDisplay();
        } else {
            clearInterval(timer);
            timer = null;
        }
    }, 1000);
}

function pausePomodoro() {
    clearInterval(timer);
    timer = null;
}

function resetPomodoro() {
    pausePomodoro();
    timeLeft = 1500;
    updateTimerDisplay();
}

render();
</script>

</body>
</html>
